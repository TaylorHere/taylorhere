name: Deploy Main Site to Cloudflare Pages

on:
  push:
    branches:
      - main
      - cursor/**
    paths:
      - "site/**"
      - ".github/workflows/deploy-main-site-pages.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      MAIN_CUSTOM_DOMAIN: taylorhere.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >
            pages deploy site
            --project-name=taylorhere
            --branch=${{ github.ref_name }}

      - name: Ensure production custom domain
        if: github.ref == 'refs/heads/main'
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_PROJECT_NAME: taylorhere
        run: |
          RESPONSE=$(curl -sS -X POST \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/pages/projects/${CF_PROJECT_NAME}/domains" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data "{\"name\":\"${MAIN_CUSTOM_DOMAIN}\"}")
          node -e "const r=JSON.parse(process.argv[1]); const exists=(r.errors||[]).some(e=>/already exists/i.test(String(e.message||''))); if(r.success||exists){console.log('Domain ensured:', process.env.MAIN_CUSTOM_DOMAIN); process.exit(0);} console.error('Failed to ensure domain', r); process.exit(1);" "$RESPONSE"
